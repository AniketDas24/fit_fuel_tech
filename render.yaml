# Render blueprint for the FitFuel backend (Docker web service, free plan).
# In the Render dashboard: New + -> Blueprint -> connect this repo. Then set every
# env var marked `sync: false` under the service's Environment tab (they are secrets
# and are intentionally NOT stored in this file).
#
# The database is NOT provisioned here — create a free Neon Postgres separately and
# paste its connection details into DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD.
services:
  - type: web
    name: fitfuel-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # --- Database (from Neon) ---
      - key: DATABASE_URL          # jdbc:postgresql://<host>/<db>?sslmode=require
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # --- Auth / admin ---
      - key: JWT_SECRET            # long random string, e.g. `openssl rand -base64 48`
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # --- CORS: your deployed frontend origin, e.g. https://fitfuel.pages.dev ---
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # --- Razorpay (live keys) ---
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET   # from Razorpay Dashboard -> Settings -> Webhooks
        sync: false
      # --- Twilio WhatsApp (production WABA + approved template) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false
