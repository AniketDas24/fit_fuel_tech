spring:
  application:
    name: fitfuel-backend
  # If no profile is passed, fall back to "local" (in-memory H2, dev secrets).
  # Production must be started explicitly with --spring.profiles.active=prod.
  profiles:
    default: local
  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

# Expose only the health endpoint (used by the hosting platform's health check).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# Common config shared by every profile. Secrets and the datasource are defined
# per-profile (application-local.yml / application-prod.yml) so a dev default can
# never silently leak into production.
fitfuel:
  # Allowed CORS origins (comma-separated). "*" for local; set the deployed frontend
  # URL(s) in production via CORS_ALLOWED_ORIGINS.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  # First-boot admin seed. Override every value in production.
  admin:
    name: ${ADMIN_NAME:FitFuel Admin}
    email: ${ADMIN_EMAIL:admin@fitfuel.com}
    password: ${ADMIN_PASSWORD:FitFuel@Admin2026}
    phone: ${ADMIN_PHONE:0000000000}
  jwt:
    ttl-minutes: ${JWT_TTL_MINUTES:1440}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    # Webhook signing secret (set in the Razorpay dashboard when creating the webhook).
    # Blank = webhook handling disabled.
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
    # Meta-approved Content Template SID (starts with HX...). Leave blank for the
    # sandbox (free-text). Required in production — Meta rejects free-text
    # business-initiated messages.
    content-sid: ${TWILIO_WHATSAPP_CONTENT_SID:}
